<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Resilient Commerce — icon</title>
<link rel="stylesheet" href="identity.css">
<style>
	/*
	 * Rendered at 128 and 256. Every weight is expressed in viewBox units so the
	 * bars still separate at 128 instead of being tuned for one size and mushing
	 * at the other. No text: a glyph, not a logotype.
	 */
	html, body { width: 100%; height: 100%; }
	body { display: grid; place-items: center; background: transparent; }
	svg { width: 100%; height: 100%; display: block; }
</style>
</head>
<body>
	<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="Resilient Commerce">
		<defs>
			<linearGradient id="field" x1="0" y1="0" x2="1" y2="1">
				<stop offset="0" stop-color="#2a2320"/>
				<stop offset="1" stop-color="#120f0e"/>
			</linearGradient>
			<linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
				<stop offset="0" stop-color="#f5a524" stop-opacity="0.52"/>
				<stop offset="1" stop-color="#f5a524" stop-opacity="0.1"/>
			</linearGradient>
			<linearGradient id="gate" x1="0" y1="0" x2="0" y2="1">
				<stop offset="0" stop-color="#ffc45e"/>
				<stop offset="1" stop-color="#e08c0c"/>
			</linearGradient>
		</defs>

		<rect width="256" height="256" rx="58" fill="url(#field)"/>
		<rect x="1.5" y="1.5" width="253" height="253" rx="56.5" fill="none" stroke="url(#rim)" stroke-width="3"/>

		<!-- Three deliveries of the same event arrive from the left. -->
		<g fill="#e9dcc9" rx="11">
			<rect x="36" y="71" width="86" height="22" rx="11" opacity="0.92"/>
			<rect x="36" y="117" width="86" height="22" rx="11" opacity="0.34"/>
			<rect x="36" y="163" width="86" height="22" rx="11" opacity="0.22"/>
		</g>

		<!-- The gate: signature, freshness, and the unique-key claim. -->
		<rect x="136" y="44" width="19" height="168" rx="9.5" fill="url(#gate)"/>

		<!-- Exactly one takes effect. -->
		<rect x="169" y="71" width="51" height="22" rx="11" fill="#57d9a3"/>
	</svg>
</body>
</html>
